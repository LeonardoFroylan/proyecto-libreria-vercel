<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Órdenes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-fondo">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-header bg-tecno text-white text-center py-4 border-0">
                        <h3 class="mb-1 fw-bold"><i class="bi bi-box-seam"></i> Inventario</h3>
                    </div>

                    <div class="card-body p-4 p-md-5 bg-white">
                        <form id="ordenForm">
                            <div class="mb-3">
                                <label for="libroId" class="form-label text-tecno fw-bold">
                                    <i class="bi bi-upc-scan text-secondary me-1"></i> ID del Libro
                                </label>
                                <input type="number" class="form-control form-control-lg bg-light" id="libroId" placeholder="Ej: 1, 4, 99" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="cantidad" class="form-label text-tecno fw-bold">
                                    <i class="bi bi-layers text-secondary me-1"></i> Cantidad
                                </label>
                                <input type="number" class="form-control form-control-lg bg-light" id="cantidad" placeholder="Ej: 2" required>
                            </div>
                            
                            <div class="mb-4">
                                <label for="cliente" class="form-label text-tecno fw-bold">
                                    <i class="bi bi-person-badge text-secondary me-1"></i> Cliente
                                </label>
                                <input type="text" class="form-control form-control-lg bg-light" id="cliente" placeholder="Ej: Frank Arce" required>
                            </div>
                            
                            <button type="submit" class="btn btn-tecno btn-lg w-100 shadow-sm rounded-3">
                                <i class="bi bi-cart-check-fill me-2"></i> Procesar Compra
                            </button>
                        </form>

                        <div id="resultado" class="mt-4 d-none"></div>
                    </div>
                </div>

                <div class="text-center mt-4 text-muted small fw-bold tracking-wide">
                    Elaborado por TecnoFroyDevs&reg;
                </div>

            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
